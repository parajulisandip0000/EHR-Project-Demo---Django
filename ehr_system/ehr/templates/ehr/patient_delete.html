<!DOCTYPE html>
<html>
<head>
    <title>Delete Patient</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'ehr/style.css' %}">
</head>
<body>
<div class="container">
    <h1>Delete Patient</h1>

    <p>Are you sure you want to delete {{ patient.patient_name }}?</p>

    <form method="POST">
        {% csrf_token %}
        <button class="danger" type="submit">Yes, Delete</button>
    </form>

    <br>
    <a class="back-link" href="{% url 'patient_list' %}">Cancel</a>
</div>
</body>
</html>
