<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'ehr/style.css' %}">
</head>
<body>
<div class="container">
    <h1>Registration Form</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Save</button>
    </form>

    <br>
    <a class="back-link" href="{% url 'registration_list' %}">Back to Registration List</a>
</div>
</body>
</html>
