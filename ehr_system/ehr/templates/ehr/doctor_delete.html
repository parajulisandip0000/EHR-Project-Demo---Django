<!DOCTYPE html>
<html>
<head>
    <title>Delete Doctor</title>
</head>
<body>
<div class="container">
    <h1>Delete Doctor</h1>

    <p>Are you sure you want to delete {{ doctor.doctor_name }}?</p>

    <form method="POST">
        {% csrf_token %}
        <button class="danger" type="submit">Yes, Delete</button>
    </form>

    <br>
    <a class="back-link" href="{% url 'doctor_list' %}">Cancel</a>
</div>
</body>
</html>
