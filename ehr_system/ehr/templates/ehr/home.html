<!DOCTYPE html>
<html>
<head>
    <title>EHR System</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'ehr/style.css' %}">
</head>
<body>
<div class="container">
    <h1>Electronic Health Record System</h1>

    <div class="count-grid">
        <div class="count-card">
            <span>Patients</span>
            <strong>{{ patient_count }}</strong>
        </div>
        <div class="count-card">
            <span>Hospitals</span>
            <strong>{{ hospital_count }}</strong>
        </div>
        <div class="count-card">
            <span>Doctors</span>
            <strong>{{ doctor_count }}</strong>
        </div>
        <div class="count-card">
            <span>Registrations</span>
            <strong>{{ registration_count }}</strong>
        </div>
    </div>

    <ul class="menu">
        <li><a href="{% url 'patient_list' %}">Manage Patients</a></li>
        <li><a href="{% url 'hospital_list' %}">Manage Hospitals</a></li>
        <li><a href="{% url 'doctor_list' %}">Manage Doctors</a></li>
        <li><a href="{% url 'registration_list' %}">Manage Registrations</a></li>
    </ul>
</div>
</body>
</html>
